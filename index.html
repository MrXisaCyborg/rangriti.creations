<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Bookkeeper Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        surface: '#1e293b',
                        primary: '#6366f1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <div id="app" class="max-w-4xl mx-auto">
        <!-- Pin Screen -->
        <div id="pinScreen" class="fixed inset-0 bg-dark z-50 flex items-center justify-center p-4">
            <div class="bg-surface p-8 rounded-3xl border border-slate-700 shadow-2xl w-full max-w-sm text-center">
                <h2 id="pinTitle" class="text-xl mb-6 font-bold text-white">Enter 4-Digit PIN</h2>
                <input type="password" id="pinInput" maxlength="4" class="bg-slate-900 border border-slate-700 w-full p-4 rounded-xl text-center text-3xl tracking-[1em] mb-6 outline-none focus:border-indigo-500">
                <button onclick="checkPin()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold shadow-lg shadow-indigo-500/20 transition">Unlock Ledger</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden space-y-8">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold text-white">Ledger Pro</h1>
                    <p class="text-slate-400">Financial Management Dashboard</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="generateMonthlyPDF()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm flex items-center gap-2">📄 Export PDF</button>
                    <button onclick="changePin()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm">🔒 Change PIN</button>
                </div>
            </header>

            <!-- Stats -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="bg-surface p-6 rounded-3xl border border-slate-800">
                    <div class="text-slate-400 text-sm">Total Revenue</div>
                    <div id="totalRevenue" class="text-3xl font-bold text-white">₹0.00</div>
                </div>
                <div class="bg-surface p-6 rounded-3xl border border-slate-800">
                    <div class="text-slate-400 text-sm">Total Profit</div>
                    <div id="totalProfit" class="text-3xl font-bold text-emerald-400">₹0.00</div>
                </div>
                <div class="bg-surface p-6 rounded-3xl border border-slate-800">
                    <div class="text-slate-400 text-sm">Pending</div>
                    <div id="pendingCount" class="text-3xl font-bold text-amber-400">0</div>
                </div>
            </div>

            <!-- Add Order Form -->
            <div class="bg-surface p-6 rounded-3xl border border-slate-800">
                <h2 class="text-lg font-bold mb-6 text-white">New Transaction</h2>
                <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <input type="text" id="itemName" placeholder="Item Name" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500" required>
                    <input type="text" id="vendorName" placeholder="Vendor" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500" required>
                    <input type="text" id="custName" placeholder="Customer" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500" required>
                    <input type="number" id="costPrice" placeholder="Cost (₹)" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500" required>
                    <input type="number" id="sellingPrice" placeholder="Selling (₹)" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500" required>
                    <input type="number" id="vendorDisc" placeholder="Vendor Disc (₹)" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500">
                    <input type="number" id="custDisc" placeholder="Cust Disc (₹)" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500">
                    <select id="paymentMethod" class="bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500">
                        <option value="Cash">Cash</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="UPI">UPI</option>
                    </select>
                    <button type="submit" class="col-span-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition shadow-lg shadow-indigo-500/20">Add Order</button>
                </form>
            </div>

            <!-- Orders Table -->
            <div class="bg-surface rounded-3xl border border-slate-800 overflow-hidden">
                <div class="p-6 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <h2 class="font-bold text-lg">Orders</h2>
                    <input type="text" id="searchInput" placeholder="Search orders..." class="bg-slate-900 p-3 rounded-xl border border-slate-700 w-full sm:w-64 outline-none focus:border-indigo-500 text-sm">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-slate-500 text-xs uppercase bg-slate-900/50">
                            <tr>
                                <th class="p-4">Item</th>
                                <th class="p-4">Customer</th>
                                <th class="p-4">Profit</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Simple Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-xl hidden animate-bounce"></div>

    <script>
        const supabaseClient = window.supabase ? window.supabase.createClient(
            'https://kdgfvzdnyloesxtqbvxe.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZ2Z2emRueWxvZXN4dHFidnhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDc1MzEsImV4cCI6MjA5Nzg4MzUzMX0.idvX60coqFAYttHlR43DUKNtpkr0YgZxcquCZF9F1ao'
        ) : null;

        let orders = [];

        window.onload = () => {
            const storedPin = localStorage.getItem('app_pin');
            if (!storedPin) {
                document.getElementById('pinTitle').innerText = "Create Your PIN";
            }
            document.getElementById('pinScreen').classList.remove('hidden');
            if(supabaseClient) fetchOrders();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function checkPin() {
            const input = document.getElementById('pinInput').value;
            const storedPin = localStorage.getItem('app_pin');
            if (!storedPin) {
                if(input.length === 4) {
                    localStorage.setItem('app_pin', input);
                    document.getElementById('pinScreen').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                } else showToast('Enter 4-digit PIN');
            } else if (input === storedPin) {
                document.getElementById('pinScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else showToast('Invalid PIN');
        }

        function changePin() {
            localStorage.removeItem('app_pin');
            location.reload();
        }

        async function fetchOrders() {
            if(!supabaseClient) return;
            const { data, error } = await supabaseClient.from('orders').select('*');
            if (error) console.error(error);
            else {
                orders = data;
                renderOrders();
                calculateTotals();
            }
        }

        async function addOrder(e) {
            e.preventDefault();
            const cp = parseFloat(document.getElementById('costPrice').value);
            const sp = parseFloat(document.getElementById('sellingPrice').value);
            const vDisc = parseFloat(document.getElementById('vendorDisc').value || 0);
            const cDisc = parseFloat(document.getElementById('custDisc').value || 0);
            
            const finalCP = cp - vDisc;
            const finalSP = sp - cDisc;
            const profit = finalSP - finalCP;

            const newOrder = {
                customerName: document.getElementById('custName').value,
                itemDescription: document.getElementById('itemName').value,
                vendorName: document.getElementById('vendorName').value,
                costPrice: cp,
                sellingPrice: sp,
                discount: cDisc,
                finalCostPrice: finalCP,
                profit: profit,
                paymentMethod: document.getElementById('paymentMethod').value,
                status: 'pending'
            };

            const { error } = await supabaseClient.from('orders').insert([newOrder]);
            if (error) showToast('Error saving order: ' + error.message);
            else {
                document.getElementById('orderForm').reset();
                showToast('Transaction recorded!');
                fetchOrders();
            }
        }

        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'pending' ? 'received' : 'pending';
            const { error } = await supabaseClient.from('orders').update({ status: newStatus }).eq('id', id);
            if (!error) fetchOrders();
        }

        function renderOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('ordersBody');
            body.innerHTML = '';
            
            orders.filter(o => (o.customerName || '').toLowerCase().includes(search) || (o.itemDescription || '').toLowerCase().includes(search))
            .forEach(o => {
                body.innerHTML += `
                    <tr>
                        <td class="p-4 font-medium text-white">${o.itemDescription}</td>
                        <td class="p-4 text-slate-400">${o.customerName}</td>
                        <td class="p-4 text-emerald-400 font-bold">₹${(o.profit || 0).toFixed(0)}</td>
                        <td class="p-4">
                            <button onclick="toggleStatus('${o.id}', '${o.status}')" 
                                class="px-3 py-1 rounded-full text-xs font-bold uppercase ${o.status === 'received' ? 'bg-emerald-900/50 text-emerald-400' : 'bg-amber-900/50 text-amber-400'}">
                                ${o.status}
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function calculateTotals() {
            let rev = 0, prof = 0, pend = 0;
            orders.forEach(o => {
                rev += parseFloat(o.sellingPrice || 0);
                prof += parseFloat(o.profit || 0);
                if (o.status === 'pending') pend++;
            });
            document.getElementById('totalRevenue').innerText = `₹${rev.toFixed(0)}`;
            document.getElementById('totalProfit').innerText = `₹${prof.toFixed(0)}`;
            document.getElementById('pendingCount').innerText = pend;
        }

        function generateMonthlyPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Monthly Order Recap", 14, 15);
            doc.autoTable({
                head: [['Item', 'Customer', 'Profit', 'Status']],
                body: orders.map(o => [o.itemDescription, o.customerName, `₹${o.profit}`, o.status])
            });
            doc.save('monthly-recap.pdf');
        }

        document.getElementById('orderForm').addEventListener('submit', addOrder);
        document.getElementById('searchInput').addEventListener('input', renderOrders);
    </script>
</body>
</html>
